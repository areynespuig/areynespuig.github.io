<html lang="en">
<head>

    <!--Import Google Icon Font-->

    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

    <!--Css-->
    <link rel="stylesheet" href="./main.css">
    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Portfolio</title>
  </head>
</head>
    <body>
        <!-- Dropdown Structure -->
        <ul id="dropdown1" class="dropdown-content">
            <li><a href="#!">one</a></li>
            <li><a href="#!">two</a></li>
            <li class="divider"></li>
            <li><a href="#!">three</a></li>
        </ul>
        <!--Navbar-->
        <nav>
            <div class="nav-wrapper green lighten-5">
              <a href="#!" class="brand-logo center green-text text-darken-4">Albert Reynés Puig</a>
              <ul class="left hide-on-med-and-down">
                <li><a class="green-text text-darken-4" href="#">Sass</a></li>
                <li><a class="green-text text-darken-4" href="#">Components</a></li>
                <!-- Dropdown Trigger -->
                <li><a class="dropdown-trigger green-text text-darken-4" href="#!" data-target="dropdown1">Dropdown<i class="material-icons right">arrow_drop_down</i></a></li>
              </ul>
            </div>
        </nav>
        <!--Typed card-->
        <div class="row">
            <div class="col s12">
              <div class="card-panel center-align teal typedCard green lighten-5">
                <h3 id="typed1" class="green-text text-darken-4"></h3>
                <h3 id="typed2" class="green-text text-darken-4"></h3>
                <h3 id="typed3" class="green-text text-darken-4"></h3>
              </div>
            </div>
        </div>
        <!-- Compiled and minified JavaScript -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
        <!--Typed script-->
        <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>      
        <script>
            var typed = new Typed("#typed1", {
                strings: ["Hello world!"],
                showCursor: false,
                typeSpeed: 150,
                startDelay: 0,
            })
            var typed = new Typed("#typed2", {
                strings: ["My Name is Albert"],
                showCursor: false,
                typeSpeed: 150,
                startDelay: 2200,
            })
            var typed = new Typed("#typed3", {
                strings: ["I am a full stack web developer"],
                showCursor: false,
                typeSpeed: 150,
                startDelay: 5700,
            })
            $(".dropdown-trigger").dropdown({hover:true});
        </script>

        </script>
